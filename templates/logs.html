{% extends "base.html" %}
{% block title %}Logs — TravelNet{% endblock %}

{% block head %}
<style>
  .log-toolbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .log-toolbar select, .log-toolbar input[type="number"] {
    width: auto; min-width: 80px;
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text-hi); border-radius: 5px;
    padding: 6px 10px; font-family: var(--mono); font-size: 12px;
  }
  #log-output {
    background: #08090c;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    height: 560px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.65;
    color: #a8b8d0;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-line { display: block; color: #a8b8d0; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .status-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.disconnected { background: var(--text-dim); }
  .status-dot.error        { background: var(--red); }

  #status-label { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .log-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }

  .level-filter { display: flex; gap: 3px; }
  .level-btn {
    font-size: 11px; padding: 4px 9px;
    font-family: var(--mono);
    border: 1px solid var(--border2);
    background: none; border-radius: 4px;
    color: var(--text-dim); cursor: pointer;
  }
  .level-btn:hover { color: var(--text-hi); border-color: var(--text-dim); }
  .level-btn.active { border-color: var(--accent); color: var(--accent); }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Logs</h1>
  <p>Live stream from <code style="font-family:var(--mono);color:var(--accent);">docker logs --follow {{ container }}</code></p>
</div>

<div class="log-toolbar">
  <label style="margin:0;display:inline;">Lines:</label>
  <input type="number" id="lines-input" value="{{ lines }}" min="10" max="2000" step="50" />

  <div class="level-filter" id="level-filter">
    <button class="level-btn"        data-rank="0">All</button>
    <button class="level-btn"        data-rank="15">UPLOAD+</button>
    <button class="level-btn active" data-rank="20">INFO+</button>
    <button class="level-btn"        data-rank="30">WARNING+</button>
    <button class="level-btn"        data-rank="40">ERROR+</button>
  </div>

  <div class="log-controls">
    <span><span class="status-dot disconnected" id="status-dot"></span>
    <span id="status-label">Disconnected</span></span>
    <button class="btn btn-primary" id="btn-connect">Connect</button>
    <button class="btn btn-ghost"   id="btn-clear">Clear</button>
    <button class="btn btn-ghost"   id="btn-scroll" title="Toggle auto-scroll">↓ Auto-scroll</button>
  </div>
</div>

<div id="log-output">(Press Connect to stream logs)</div>

<script>
  const output    = document.getElementById('log-output');
  const dot       = document.getElementById('status-dot');
  const label     = document.getElementById('status-label');
  const btnConn   = document.getElementById('btn-connect');
  const btnClear  = document.getElementById('btn-clear');
  const btnScroll = document.getElementById('btn-scroll');
  const linesIn   = document.getElementById('lines-input');

  let es = null;
  let autoScroll   = true;
  let minLevelRank = 20; // default: INFO+

  const LEVEL_RANK = { debug: 10, upload: 15, info: 20, warn: 30, err: 40, critical: 50 };

  const levelColors = {
    upload:   '#e8d040',
    err:      '#e05252',
    warn:     '#f0b83d',
    debug:    '#00b8b8',
    info:     '#34c47c',
    critical: '#b05ed4',
  };

  function setStatus(state) {
    dot.className = 'status-dot ' + state;
    label.textContent = state.charAt(0).toUpperCase() + state.slice(1);
  }

  function levelForLine(line) {
    const clean  = line.replace(/\x1b\[[0-9;]*m/g, '');
    const parts  = clean.split('|').map(s => s.trim());
    if (parts.length >= 2) {
      const level = parts[1].trim().toUpperCase();
      if (['ERROR', 'CRITICAL'].includes(level)) return 'err';
      if (level === 'WARNING')                    return 'warn';
      if (level === 'UPLOAD')                     return 'upload';
      if (level === 'DEBUG')                      return 'debug';
      if (level === 'INFO')                       return 'info';
    }
    const l = clean.toLowerCase();
    if (l.includes('traceback') || l.includes('exception')) return 'err';
    return 'info';
  }

  function appendLine(text) {
    const level = levelForLine(text);
    const parts = text.split('|');
    const span  = document.createElement('span');
    span.className = 'log-line';

    if (parts.length >= 2) {
      const pre = document.createTextNode(parts[0] + '| ');
      const lvl = document.createElement('span');
      lvl.textContent = parts[1].trim();
      lvl.style.color = levelColors[level] || '#a8b8d0';
      const rest = document.createTextNode(' |' + parts.slice(2).join('|'));
      span.appendChild(pre);
      span.appendChild(lvl);
      span.appendChild(rest);
    } else {
      span.textContent = text;
      if (level === 'err') span.style.color = levelColors.err;
    }

    const entry = document.createElement('div');
    entry.dataset.level = level;
    if ((LEVEL_RANK[level] ?? 20) < minLevelRank) entry.style.display = 'none';
    entry.appendChild(span);
    output.appendChild(entry);
    if (autoScroll) output.scrollTop = output.scrollHeight;
  }

  function applyFilter() {
    output.querySelectorAll('div[data-level]').forEach(entry => {
      const rank = LEVEL_RANK[entry.dataset.level] ?? 20;
      entry.style.display = rank >= minLevelRank ? '' : 'none';
    });
    if (autoScroll) output.scrollTop = output.scrollHeight;
  }

  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      minLevelRank = parseInt(btn.dataset.rank);
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    });
  });

  function connect() {
    if (es) { es.close(); es = null; }
    const lines = parseInt(linesIn.value) || 200;
    output.textContent = '';
    setStatus('connected');
    btnConn.textContent = 'Reconnect';

    es = new EventSource(`/logs/stream?lines=${lines}`);
    es.onmessage = e => appendLine(e.data);
    es.onerror   = () => {
      setStatus('error');
      label.textContent = 'Connection lost';
      btnConn.textContent = 'Reconnect';
    };
    es.onopen = () => setStatus('connected');
  }

  btnConn.addEventListener('click', connect);

  btnClear.addEventListener('click', () => {
    output.textContent = '';
  });

  btnScroll.addEventListener('click', () => {
    autoScroll = !autoScroll;
    btnScroll.textContent = autoScroll ? '↓ Auto-scroll' : '⏸ Paused';
    btnScroll.style.color = autoScroll ? '' : 'var(--yellow)';
    if (autoScroll) output.scrollTop = output.scrollHeight;
  });
</script>
{% endblock %}
